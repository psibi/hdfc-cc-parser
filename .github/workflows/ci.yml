name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: taiki-e/install-action@just

      - name: Run CI checks
        run: just ci
